apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: binding-{{.Iteration}}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  # Calculate: Iteration / clusterRoleRepeatN
  # e.g., iteration 1 with clusterRoleRepeatN=2 → 1/2 = 0 → clusterrole-0
  name: clusterrole-{{ div .Iteration .clusterRoleRepeatN }}
subjects:
  - kind: ServiceAccount
    name: default
    namespace: {{.namespace}}-{{.Iteration}}
