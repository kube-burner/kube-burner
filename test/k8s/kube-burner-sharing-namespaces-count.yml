---
global:
  gc: false

jobs:
  - name: sharing-namespaces-count-test
    jobType: create
    jobIterations: 6
    qps: 20
    burst: 20
    namespacedIterations: true
    namespace: snc-test
    waitWhenFinished: true
    verifyObjects: true
    errorOnVerify: true
    churnConfig:
      duration: 10s
      percent: 20
      delay: 2s
      mode: namespaces
      
    objects:
      # ClusterRole created once per 2 namespaces (shared across snc-test-0/snc-test-1, snc-test-2/snc-test-3)
      - objectTemplate: objectTemplates/clusterrole.yml
        sharingNamespacesCount: 2

      # RoleBinding in each namespace, referencing the shared ClusterRole
      - objectTemplate: objectTemplates/rolebinding.yml
        inputVars:
          clusterRoleSnc: 2 # Must match ClusterRole's sharingNamespacesCount
          namespace: snc-test
