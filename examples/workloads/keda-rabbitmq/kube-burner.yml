metricsEndpoints:
  - indexer:
      type: local
      metricsDirectory: collected-metrics
    metrics: [../../metrics-profiles/keda-metrics.yml]
global:
  gc: false
  timeout: 40m
  measurements:
    # 1. ScaledObject lifecycle latency measurement
    - name: scaledObjectLatency
      thresholds:
        - conditionType: ScaledObjectActive
          metric: P99
          threshold: 60s
        - conditionType: HPACreated
          metric: P99
          threshold: 60s
        - conditionType: DeploymentReady
          metric: P99
          threshold: 120s

    - name: podLatency
      thresholds:
        - conditionType: Ready
          metric: P99

    - name: serviceLatency
      svcTimeout: 5s
    - name: nodeLatency

jobs:
  # Job 1: Create queues and services
  - name: create-queue
    jobType: create
    jobIterations: 10
    qps: 5
    burst: 10
    namespacedIterations: false
    namespace: keda-perf-test
    waitWhenFinished: true
    objects:
      - objectTemplate: examples/workloads/keda-rabbitmq/templates/create-queue.yml
        replicas: 1
  # Job 2: Create producers to send messages to the queues via kubernetes jobs
  - name: rabbitmq-producers
    jobType: create
    jobIterations: 10
    qps: 5
    burst: 10
    namespacedIterations: false
    namespace: keda-perf-test
    waitWhenFinished: false
    objects:
      - objectTemplate: examples/workloads/keda-rabbitmq/templates/producer-ramp-up-job.yml
        replicas: 1
        inputVars:
          containerImage: pivotalrabbitmq/perf-test:latest
          producerPerPodCount: 10

  # Job 3: Create consumers to consume messages from the queues via kubernetes jobs and scale them using keda scaled objects
  - name: rabbitmq-consumers
    jobType: create
    measurements:
      - name: pprof
        pprofInterval: 30m
        pprofDirectory: /tmp/pprof-keda/rabbit-mq-5-ramp-up
        pprofTargets:
          - name: keda-operator
            url: http://10.43.144.36:8082/debug/pprof/profile?seconds=1800
          - name: keda-operator-heap
            url: http://10.43.144.36:8082/debug/pprof/heap
          - name: keda-operator-metrics-apiserver
            url: http://10.43.126.1:8083/debug/pprof/profile?seconds=1800
          - name: keda-operator-metrics-apiserver-heap
            url: http://10.43.126.1:8083/debug/pprof/heap
          - name: keda-admission-webhooks
            url: http://10.43.151.88:8084/debug/pprof/profile?seconds=1800
          - name: keda-admission-webhooks-heap
            url: http://10.43.151.88:8084/debug/pprof/heap
    jobIterations: 10
    qps: 5
    burst: 10
    namespacedIterations: false
    namespace: keda-perf-test
    waitWhenFinished: true
    jobPause: 30m
    metricsClosing: afterJob
    objects:
      - objectTemplate: examples/workloads/keda-rabbitmq/templates/consumer-deployment.yml
        replicas: 1
        inputVars:
          containerImage: pivotalrabbitmq/perf-test:latest
          consumerPerPodCount: 2
      - objectTemplate: examples/workloads/keda-rabbitmq/templates/scaledobject.yml
        replicas: 1
        inputVars:
          minReplicaCount: 0
          maxReplicaCount: 30
          cooldownPeriod: 30
          pollingInterval: 15
          queueLength: '"50"' # To ignore parsing as int in yaml and pass as string

  # Job 4: Delete ScaledObjects and collect final metrics
  - name: rabbitmq-delete
    jobType: delete
    waitForDeletion: true
    namespace: keda-perf-test
    objects:
      - kind: ScaledObject
        apiVersion: keda.sh/v1alpha1
        labelSelector: { kube-burner.io/job: rabbitmq-consumers }

  # Job 5: Delete the RabbitMQ queues we created
  - name: delete-queues
    jobType: create
    jobIterations: 10
    qps: 5
    burst: 10
    namespacedIterations: false
    namespace: keda-perf-test
    waitWhenFinished: false
    maxWaitTimeout: 2m
    objects:
      - objectTemplate: examples/workloads/keda-rabbitmq/templates/delete-queue.yml
        replicas: 1
