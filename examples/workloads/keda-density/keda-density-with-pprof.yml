---
global:
  gc: false
  measurements:
    # 1. ScaledObject lifecycle latency measurement
    - name: scaledObjectLatency
      thresholds:
        - conditionType: ScaledObjectActive
          metric: P99
          threshold: 60s
        - conditionType: HPACreated
          metric: P99
          threshold: 60s
        - conditionType: DeploymentReady
          metric: P99
          threshold: 120s

    # 2. KEDA Operator pprof — CPU + heap profiles
    - name: pprof
      pprofInterval: 30s
      pprofDirectory: /tmp/pprof-keda
      nodeAffinity:
        node-role.kubernetes.io/control-plane: ""
      pprofTargets:
        - name: keda-operator
          url: http://keda-operator.keda.svc.cluster.local:8082/debug/pprof/profile?seconds=30
        - name: keda-operator-heap
          url: http://keda-operator.keda.svc.cluster.local:8082/debug/pprof/heap
        - name: keda-metrics-apiserver
          url: http://keda-operator-metrics-apiserver.keda.svc.cluster.local:8083/debug/pprof/profile?seconds=30
        - name: keda-metrics-apiserver-heap
          url: http://keda-operator-metrics-apiserver.keda.svc.cluster.local:8083/debug/pprof/heap



metricsEndpoints:
  - endpoint: http://localhost:9091
    metrics:
      - examples/metrics-profiles/keda-metrics.yml
    indexer:
      type: local
      metricsDirectory: collected-metrics

jobs:
  # Job 1: Idle period — clean up any existing ScaledObjects
  # - name: keda-density-idle
  #   jobType: create
  #   jobIterations: 1
  #   qps: 1
  #   burst: 1
  #   namespacedIterations: false
  #   cleanup: true
  #   namespace: keda-density
  #   waitWhenFinished: true
  #   jobPause: 10s
  #   objects:
  #     - objectTemplate: examples/workloads/keda-density/templates/deployment.yml
  #       replicas: 1

  # Job 2: Create ScaledObjects at scale
  - name: keda-density
    jobType: create
    jobIterations: 100 
    qps: 50
    burst: 100
    namespacedIterations: false
    cleanup: true
    namespace: keda-density
    waitWhenFinished: false
    jobPause: 120s
    objects:
      - objectTemplate: examples/workloads/keda-density/templates/deployment.yml
        replicas: 1
      - objectTemplate: examples/workloads/keda-density/templates/scaledobject.yml
        replicas: 1
        inputVars:
          prometheusAddr: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090"
          metricQuery: "fake_http_requests_total{job=\"fake-metrics-exporter\"}"
          threshold: "100"
          activationThreshold: "5"
          minReplicas: 0
          maxReplicas: 10
          pollingInterval: 15
          cooldownPeriod: 60

  # Job 3: Delete ScaledObjects and collect final metrics
  - name: keda-density-delete
    jobType: delete
    waitForDeletion: true
    namespace: keda-density
    objects:
      - kind: ScaledObject
        apiVersion: keda.sh/v1alpha1
        labelSelector: {kube-burner.io/job: keda-density}
