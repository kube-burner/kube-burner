---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app-{{.Iteration}}-{{.Replica}}
  labels:
    app: web-app-{{.Iteration}}-{{.Replica}}
spec:
  # DO NOT set replicas here — KEDA/HPA manages this
  selector:
    matchLabels:
      app: web-app-{{.Iteration}}-{{.Replica}}
  template:
    metadata:
      labels:
        app: web-app-{{.Iteration}}-{{.Replica}}
    spec:
      volumes:
        - name: cache-volume
          emptyDir: {}
        - name: app-config
          emptyDir: {}
      containers:
        - name: backend-api
          image: ghcr.io/stefanprodan/podinfo:6.6.0
          ports:
            - containerPort: 9898
          env:
            - name: NODE_ENV
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            - name: PODINFO_UI_MESSAGE
              value: "Kube-burner load testing"
            - name: MAX_CONNECTIONS
              value: "500"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - mountPath: /var/cache/app
              name: cache-volume
            - mountPath: /etc/app/config
              name: app-config
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9898
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9898
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
        - name: log-forwarder-sidecar
          image: registry.k8s.io/e2e-test-images/agnhost:2.45
          command: ["/agnhost", "pause"]
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - mountPath: /var/log/backend
              name: cache-volume
              readOnly: true
