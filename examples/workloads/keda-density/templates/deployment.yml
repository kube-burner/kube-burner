---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app-{{.Iteration}}-{{.Replica}}
  labels:
    app: web-app-{{.Iteration}}-{{.Replica}}
spec:
  # DO NOT set replicas here — KEDA/HPA manages this
  selector:
    matchLabels:
      app: web-app-{{.Iteration}}-{{.Replica}}
  template:
    metadata:
      labels:
        app: web-app-{{.Iteration}}-{{.Replica}}
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
